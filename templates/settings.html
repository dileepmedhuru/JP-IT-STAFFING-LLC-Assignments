{% extends "base.html" %}

{% block title %}Settings | EmailPro{% endblock %}

{% block content %}

<div class="section-header">
  <h1 class="section-title">Settings</h1>
  <p class="section-subtitle">Configure SMTP credentials, AI API key, and your default email template.</p>
</div>

<div style="max-width: 700px; margin: 0 auto; display: flex; flex-direction: column; gap: 1.75rem;">

  <form action="{{ url_for('settings_action') }}" method="POST">

    <!-- SMTP Settings -->
    <div class="emailpro-card">
      <h3 class="settings-section-heading"><i class="fa-solid fa-envelope" style="color: var(--primary-color);"></i> SMTP Settings</h3>

      <div class="form-group">
        <label class="form-label">SMTP Email</label>
        <input type="email" name="gmail_email" class="composer-input" value="{{ settings.gmail_email }}" placeholder="your-email@gmail.com" required>
      </div>
      <div class="form-group" style="margin-bottom: 0;">
        <label class="form-label">Password (App Password)</label>
        <input type="password" name="app_password" class="composer-input" value="{{ settings.app_password }}" placeholder="16-character Gmail App Password">
      </div>
    </div>

    <!-- Gemini API -->
    <div class="emailpro-card">
      <h3 class="settings-section-heading"><i class="fa-solid fa-robot" style="color: #8b5cf6;"></i> Gemini API</h3>

      <div class="form-group" style="margin-bottom: 0;">
        <label class="form-label">Gemini API Key</label>
        <input type="password" name="gemini_api_key" class="composer-input" value="{{ settings.gemini_api_key }}" placeholder="AI key for zero-shot classification & email generation">
      </div>
    </div>

    <!-- Default Email Template -->
    <div class="emailpro-card">
      <h3 class="settings-section-heading"><i class="fa-solid fa-file-lines" style="color: #10b981;"></i> Default Email Template</h3>

      <div class="form-group">
        <label class="form-label">Sender Name</label>
        <input type="text" name="sender_name" class="composer-input" value="{{ settings.sender_name or 'EmailPro Admin' }}" required>
      </div>
      <div class="form-group">
        <label class="form-label">Default Subject</label>
        <input type="text" name="default_subject" class="composer-input" value="{{ settings.default_subject or 'Summer Internship Program' }}" required>
      </div>
      <div class="form-group" style="margin-bottom: 0;">
        <label class="form-label">Default Message</label>
        <textarea name="default_message" class="composer-textarea" rows="4">{{ settings.default_message or 'Dear Partner,\n\nWe invite your organization to participate.\n\nBest regards,\nEmailPro Team' }}</textarea>
      </div>
    </div>

    <!-- Save Button -->
    <button type="submit" class="btn-emailpro" style="width: 100%; padding: 1rem; font-size: 1.05rem;">
      <i class="fa-solid fa-floppy-disk"></i> Save Settings
    </button>

  </form>

</div>

{% endblock %}
